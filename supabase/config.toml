# Minimal Supabase CLI config for local development (`npx supabase start`).
# Full defaults are fine for this app; ports match README local setup.

project_id = "workgether"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[realtime]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
